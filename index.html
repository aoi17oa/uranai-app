<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日の星うらない</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-width: 320px;
      overflow-x: hidden;
      color: #1f2a44;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 26%, rgba(255, 255, 255, 0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 72%, rgba(255, 255, 255, 0.8) 0 1px, transparent 2px),
        linear-gradient(180deg, #eef7ff 0%, #dbeaff 45%, #f8fbff 100%);
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 18px;
    }

    .app-shell {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .screen[hidden] {
      display: none;
    }

    .badge {
      display: inline-block;
      margin: 0 0 18px;
      padding: 6px 14px;
      border: 1px solid rgba(72, 104, 157, 0.18);
      border-radius: 999px;
      color: #365273;
      background: rgba(255, 255, 255, 0.68);
      font-size: 16px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      color: #17233d;
      font-size: clamp(32px, 9vw, 44px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px auto 30px;
      max-width: 22em;
      color: #425b78;
      font-size: 17px;
    }

    .start-button,
    .choice-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .start-button {
      min-height: 56px;
      padding: 14px 22px;
      color: #ffffff;
      background: #315f9f;
      box-shadow: 0 10px 22px rgba(49, 95, 159, 0.22);
      font-size: 18px;
    }

    .start-button:focus-visible,
    .choice-button:focus-visible {
      outline: 3px solid #f5c85c;
      outline-offset: 4px;
    }

    .progress {
      margin: 0 0 16px;
      color: #365273;
      font-size: 16px;
      font-weight: 700;
    }

    .question-title {
      margin: 0 0 22px;
      color: #17233d;
      font-size: 26px;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      gap: 12px;
      width: 100%;
      margin: 0;
    }

    .choice-button {
      min-height: 54px;
      padding: 14px 16px;
      color: #233755;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(72, 104, 157, 0.22);
      box-shadow: 0 8px 18px rgba(45, 79, 124, 0.12);
      font-size: 17px;
      line-height: 1.45;
      text-align: center;
    }

    .complete-message {
      margin: 18px auto 30px;
      color: #425b78;
      font-size: 17px;
    }

    .result-list {
      display: grid;
      gap: 12px;
      margin: 24px 0 0;
      text-align: left;
    }

    .result-item {
      padding: 16px;
      border: 1px solid rgba(72, 104, 157, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 18px rgba(45, 79, 124, 0.1);
    }

    .result-label {
      margin: 0 0 6px;
      color: #365273;
      font-size: 16px;
      font-weight: 700;
    }

    .result-text {
      margin: 0;
      color: #233755;
      font-size: 16px;
    }

    @media (max-width: 390px) {
      .page {
        padding-inline: 16px;
      }

      .lead,
      .complete-message {
        font-size: 16px;
      }

      .question-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="app-shell">
      <section class="screen" id="start-screen" aria-labelledby="app-title">
        <p class="badge">今日の運勢・ラッキーカラー・名言</p>
        <h1 id="app-title">今日の星うらない</h1>
        <p class="lead">5つの質問で、今日のあなたにぴったりの運勢を見つけます。</p>
        <button class="start-button" id="start-button" type="button">占いをはじめる</button>
      </section>

      <section class="screen" id="question-screen" aria-labelledby="question-title" hidden>
        <p class="progress" id="progress-text"></p>
        <h2 class="question-title" id="question-title"></h2>
        <div class="choices" id="choices"></div>
      </section>

      <section class="screen" id="result-screen" aria-labelledby="result-title" hidden>
        <p class="badge" id="result-type"></p>
        <h2 class="question-title" id="result-title"></h2>
        <p class="complete-message" id="result-summary"></p>
        <div class="result-list" aria-label="占い結果">
          <section class="result-item">
            <p class="result-label">今日の運勢</p>
            <p class="result-text" id="fortune-text"></p>
          </section>
          <section class="result-item">
            <p class="result-label">ラッキーカラー</p>
            <p class="result-text" id="color-text"></p>
          </section>
          <section class="result-item">
            <p class="result-label">ぴったりな名言</p>
            <p class="result-text" id="quote-text"></p>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script>
    const questions = [
      {
        text: "今朝の気分に近いものは？",
        choices: [
          { text: "すっきりしている", type: "spark" },
          { text: "少しゆっくりしたい", type: "calm" },
          { text: "なんとなくそわそわする", type: "moon" }
        ]
      },
      {
        text: "今日、いちばん大事にしたいことは？",
        choices: [
          { text: "自分のペース", type: "calm" },
          { text: "人とのつながり", type: "heart" },
          { text: "小さな挑戦", type: "spark" }
        ]
      },
      {
        text: "今のあなたに近い過ごし方は？",
        choices: [
          { text: "ていねいに整えたい", type: "leaf" },
          { text: "楽しく動きたい", type: "spark" },
          { text: "静かに考えたい", type: "moon" }
        ]
      },
      {
        text: "気になる色はどれ？",
        choices: [
          { text: "やさしい青", type: "calm" },
          { text: "あたたかいピンク", type: "heart" },
          { text: "明るい黄色", type: "spark" }
        ]
      },
      {
        text: "今日ほしい言葉は？",
        choices: [
          { text: "そのままで大丈夫", type: "leaf" },
          { text: "一歩進んでみよう", type: "spark" },
          { text: "ちゃんと休んでいい", type: "moon" }
        ]
      }
    ];

    const results = {
      spark: {
        type: "きらめきタイプ",
        title: "小さな一歩が光る日",
        summary: "思いついたことを少しだけ試すと、気持ちが前に向きやすい日です。",
        fortune: "新しい流れを受け取りやすい運勢です。完璧を目指すより、まず一歩だけ動いてみるとよさそうです。",
        color: "クリアブルー",
        quote: "小さな一歩も、今日のあなたをちゃんと進めてくれます。"
      },
      calm: {
        type: "やすらぎタイプ",
        title: "自分のペースを守る日",
        summary: "急がず整えることで、自然と調子が戻ってくる日です。",
        fortune: "落ち着いて選ぶほど運が味方します。予定を詰め込みすぎず、深呼吸できる余白を残しましょう。",
        color: "やさしい水色",
        quote: "ゆっくり進む時間にも、ちゃんと意味があります。"
      },
      heart: {
        type: "ぬくもりタイプ",
        title: "言葉がやさしく届く日",
        summary: "人とのやりとりから、ほっとする力をもらいやすい日です。",
        fortune: "あいさつや短い会話が運をひらきます。無理に明るくしなくても、素直な一言で十分です。",
        color: "ソフトピンク",
        quote: "やさしさは、渡した人にも戻ってくる小さなお守りです。"
      },
      moon: {
        type: "月あかりタイプ",
        title: "心の声を聞く日",
        summary: "静かな時間を少し作ると、本当に大事なことが見えやすい日です。",
        fortune: "考えを整理するほど安心が増える運勢です。迷ったら、今日は少し保留にしても大丈夫です。",
        color: "ラベンダー",
        quote: "立ち止まることは、迷いではなく自分を大切にする合図です。"
      },
      leaf: {
        type: "整えタイプ",
        title: "身の回りを整える日",
        summary: "小さな片づけや準備が、今日の安心につながりやすい日です。",
        fortune: "足元を整えるほど、気持ちも軽くなります。ひとつだけ片づける、ひとつだけ決める、それで十分です。",
        color: "ミントグリーン",
        quote: "整えた場所から、心にもやさしい風が入ってきます。"
      }
    };

    const startScreen = document.getElementById("start-screen");
    const questionScreen = document.getElementById("question-screen");
    const resultScreen = document.getElementById("result-screen");
    const startButton = document.getElementById("start-button");
    const progressText = document.getElementById("progress-text");
    const questionTitle = document.getElementById("question-title");
    const choices = document.getElementById("choices");
    const resultType = document.getElementById("result-type");
    const resultTitle = document.getElementById("result-title");
    const resultSummary = document.getElementById("result-summary");
    const fortuneText = document.getElementById("fortune-text");
    const colorText = document.getElementById("color-text");
    const quoteText = document.getElementById("quote-text");

    let currentQuestionIndex = 0;
    let scores = {};

    function showScreen(screen) {
      startScreen.hidden = screen !== startScreen;
      questionScreen.hidden = screen !== questionScreen;
      resultScreen.hidden = screen !== resultScreen;
    }

    function showQuestion() {
      const question = questions[currentQuestionIndex];
      progressText.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
      questionTitle.textContent = question.text;
      choices.innerHTML = "";

      question.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.className = "choice-button";
        button.type = "button";
        button.textContent = choice.text;
        button.addEventListener("click", () => handleChoice(choice.type));
        choices.appendChild(button);
      });

      showScreen(questionScreen);
    }

    function handleChoice(type) {
      scores[type] = (scores[type] || 0) + 1;
      currentQuestionIndex += 1;

      if (currentQuestionIndex >= questions.length) {
        showResult();
        return;
      }

      showQuestion();
    }

    function getResultType() {
      const typeOrder = ["spark", "calm", "heart", "moon", "leaf"];
      return typeOrder.reduce((bestType, type) => {
        const bestScore = scores[bestType] || 0;
        const score = scores[type] || 0;
        return score > bestScore ? type : bestType;
      }, typeOrder[0]);
    }

    function showResult() {
      const result = results[getResultType()];
      resultType.textContent = result.type;
      resultTitle.textContent = result.title;
      resultSummary.textContent = result.summary;
      fortuneText.textContent = result.fortune;
      colorText.textContent = result.color;
      quoteText.textContent = result.quote;
      showScreen(resultScreen);
    }

    startButton.addEventListener("click", () => {
      currentQuestionIndex = 0;
      scores = {};
      showQuestion();
    });
  </script>
</body>
</html>
