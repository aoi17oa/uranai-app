<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日の星うらない</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-width: 320px;
      overflow-x: hidden;
      color: #1f2a44;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 26%, rgba(255, 255, 255, 0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 72%, rgba(255, 255, 255, 0.8) 0 1px, transparent 2px),
        linear-gradient(180deg, #eef7ff 0%, #dbeaff 45%, #f8fbff 100%);
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 18px;
    }

    .start-screen {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin: 0 0 18px;
      padding: 6px 14px;
      border: 1px solid rgba(72, 104, 157, 0.18);
      border-radius: 999px;
      color: #365273;
      background: rgba(255, 255, 255, 0.68);
      font-size: 16px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      color: #17233d;
      font-size: clamp(32px, 9vw, 44px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px auto 30px;
      max-width: 22em;
      color: #425b78;
      font-size: 17px;
    }

    .start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      padding: 14px 22px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #315f9f;
      box-shadow: 0 10px 22px rgba(49, 95, 159, 0.22);
      font: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .start-button:focus-visible {
      outline: 3px solid #f5c85c;
      outline-offset: 4px;
    }

    @media (max-width: 390px) {
      .page {
        padding-inline: 16px;
      }

      .lead {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="start-screen" aria-labelledby="app-title">
      <p class="badge">今日の運勢・ラッキーカラー・名言</p>
      <h1 id="app-title">今日の星うらない</h1>
      <p class="lead">5つの質問で、今日のあなたにぴったりの運勢を見つけます。</p>
      <button class="start-button" type="button">占いをはじめる</button>
    </section>
  </main>
</body>
</html>
